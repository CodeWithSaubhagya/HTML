<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="./dashboard.html">
        <label for="First-Name">
            First Name 
            <input type="text" name="" id="First-Name" placeholder="Enter your first name" required>
        </label><br><br>
        <label for="Last-Name">
            Last Name 
            <input type="text" name="" id="Last-Name" placeholder="Enter your last name" required>
        </label><br><br>
        <label for="Email">
            Email 
            <input type="email" name="" id="Email" placeholder="Enter your email " required>
        </label><br><br>
        <label for="Password">
            Password 
            <input type="password" name="" id="Password" placeholder="Enter your password" required>
        </label><br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
